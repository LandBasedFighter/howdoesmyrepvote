services:
  - type: web
    name: howdoesmyrepvote-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir rep-tracker/backend app:app --bind 0.0.0.0:$PORT --workers 2 --threads 8 --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: CORS_ORIGINS
        value: https://howdoesmyrepvote.us
      - key: CONGRESS_CIVIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
