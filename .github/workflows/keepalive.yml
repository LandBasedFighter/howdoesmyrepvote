name: Keep backend awake

# Render's free tier sleeps a service after ~15 minutes of inactivity, which then
# costs a ~50s cold start on the next visit. Pinging /health every ~10 minutes keeps
# the instance warm. A single always-on free service stays within Render's monthly
# instance-hour allowance.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: >-
          curl -fsS --max-time 60 --retry 3 --retry-delay 15
          https://howdoesmyrepvote-api.onrender.com/health
